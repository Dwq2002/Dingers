name: Daily Notebook Run

permissions:
  contents: write


on:
  schedule:
    - cron: "0 11 * * *"  # 13:00 UTC = 8:00am America/Chicago during CDT
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install papermill jupyter nbconvert

      - name: Execute notebook (inject date)
        run: papermill Dingers_2026.ipynb output.ipynb -p RUN_DATE "$(date -u +%F)"

      - name: Upload executed notebook (optional)
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook
          path: output.ipynb

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: Daily Dingers Report # <-- guaranteed defined
          to: "qwd2002@gmail.com, rhinoswank87@gmail.com,jteheng@gmail.com,ethan.hughes713@gmail.com,bespey80@gmail.com"
          from: "DingerBot445 <${{ secrets.MAIL_USER }}>"
          secure: false
          html_body: file://summary.html
