<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dingers 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

    :root {
      --bg: #0d0f14;
      --card: #161b25;
      --border: #252d3d;
      --text: #e8eaf0;
      --muted: #6b7694;
      --green: #00c47d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #fff 30%, #ffd166 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .card.full { grid-column: 1 / -1; }

    .card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* Standings */
    .standings-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .standings-row:last-child { border-bottom: none; }

    .team-logo {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .team-logo-fallback {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .team-name {
      font-weight: 700;
      font-size: 1.1rem;
      flex: 1;
    }

    .team-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.04em;
    }

    .team-change {
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      width: 52px;
      text-align: center;
      flex-shrink: 0;
    }
    .team-change.up   { background: rgba(0,196,125,0.15); color: var(--green); }
    .team-change.zero { background: rgba(107,118,148,0.15); color: var(--muted); }

    /* Today's scorers */
    .scorers-wrapper {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      position: relative;
    }
    .scorers-wrapper.expanded { overflow: visible; }

    .scorer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .scorer-row:last-child { border-bottom: none; }

    .scorer-name { font-weight: 600; font-size: 0.95rem; }
    .scorer-team { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .scorer-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .expand-btn {
      display: none;
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .expand-btn:hover { color: var(--text); }

    .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 20px 0; }

    /* HBP panel */
    .hbp-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    @media (max-width: 720px) {
      .hbp-grid { grid-template-columns: repeat(2, 1fr); }
    }
    .hbp-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 16px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .hbp-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }
    .hbp-logo-fallback {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 2px solid var(--border);
    }
    .hbp-team { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .hbp-player { font-weight: 600; font-size: 0.85rem; line-height: 1.3; }
    .hbp-pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      line-height: 1;
    }
    .hbp-count { font-size: 0.85rem; font-weight: 600; margin-top: 2px; }
    .hbp-label { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }
    .hbp-rate { font-size: 0.68rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.03em; }

    /* Chart */
    .chart-wrap { position: relative; height: 420px; }

    /* Loading */
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .updated {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 32px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<header>
  <h1>Dingers 2026</h1>
  <p>HR Fantasy League &bull; Season Standings</p>
</header>

<div class="grid" id="app">
  <div class="loading" style="grid-column:1/-1">Loading stats...</div>
</div>

<p class="updated" id="updated"></p>

<script>
const RAW = 'https://raw.githubusercontent.com/Dwq2002/Dingers/main/data/daily/';

const TEAM_COLORS = {
  'Kid Named Dinger': '#4e8ef7',
  Bo:                 '#f7674e',
  Swank:              '#ffd166',
  "Swank's Tanks":    '#a78bfa',
  "Swank's Shanks":   '#00c47d',
};

const RAW_ASSETS = 'https://raw.githubusercontent.com/Dwq2002/Dingers/main/assets/team_icons/';
const TEAM_LOGOS = {
  'Kid Named Dinger': RAW_ASSETS + 'Kid_Named_Dinger.JPEG',
  Bo:                 RAW_ASSETS + 'Bo.PNG',
  Swank:              RAW_ASSETS + 'Swank.PNG',
  "Swank's Tanks":    RAW_ASSETS + 'Swanks_Tanks.JPEG',
  "Swank's Shanks":   RAW_ASSETS + 'Swanks_Shanks.JPG',
};

function parseCSV(text) {
  const [header, ...rows] = text.trim().split('\n');
  const keys = header.split(',');
  return rows.map(row => {
    const vals = row.split(',');
    const obj = {};
    keys.forEach((k, i) => obj[k.trim()] = vals[i]?.trim());
    obj.points = Number(obj.points) || 0;
    return obj;
  });
}

function teamTotals(rows) {
  const totals = {};
  for (const r of rows) {
    totals[r.team] = (totals[r.team] || 0) + r.points;
  }
  return totals;
}

function getDates(start, end) {
  const dates = [];
  const cur = new Date(start + 'T12:00:00Z');
  const last = new Date(end + 'T12:00:00Z');
  while (cur <= last) {
    dates.push(cur.toISOString().slice(0, 10));
    cur.setUTCDate(cur.getUTCDate() + 1);
  }
  return dates;
}

async function fetchCSV(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return parseCSV(await r.text());
  } catch { return null; }
}

async function main() {
  const latest = await fetchCSV(RAW + 'latest.csv');
  if (!latest) {
    document.getElementById('app').innerHTML = '<div class="loading" style="grid-column:1/-1">Could not load data.</div>';
    return;
  }

  const latestDate = latest[0]?.date || '2026-03-27';
  const startDate  = '2026-03-23';
  const dates = getDates(startDate, latestDate);

  // Fetch all daily CSVs for chart
  const dailyData = {};
  await Promise.all(dates.map(async d => {
    const rows = await fetchCSV(RAW + `points_${d}.csv`);
    if (rows) dailyData[d] = teamTotals(rows);
  }));

  // Current standings from latest
  const current = teamTotals(latest);
  const sorted = Object.entries(current).sort((a, b) => b[1] - a[1]);

  // Previous day totals for change indicator
  const prevDate = dates[dates.length - 2];
  const prev = prevDate && dailyData[prevDate] ? dailyData[prevDate] : {};

  // HBP players — last player listed per team in the CSV
  const hbpPlayers = {};
  for (const r of latest) { hbpPlayers[r.team] = r; }

  // Today's scorers — diff today vs yesterday to get only points earned today
  const prevRows = prevDate ? await fetchCSV(RAW + `points_${prevDate}.csv`) : null;
  const prevPlayerPts = {};
  if (prevRows) { for (const r of prevRows) prevPlayerPts[r.player] = r.points; }

  const scorers = latest
    .map(r => ({ ...r, todayPts: r.points - (prevPlayerPts[r.player] || 0) }))
    .filter(r => r.todayPts > 0)
    .sort((a, b) => b.todayPts - a.todayPts);

  // Build HTML
  const standingsHTML = sorted.map(([team, pts], i) => {
    const change = pts - (prev[team] || 0);
    const changeHTML = change > 0
      ? `<span class="team-change up">+${change}</span>`
      : `<span class="team-change zero">—</span>`;
    const logoSrc = TEAM_LOGOS[team];
    const logoEl = logoSrc
      ? `<img class="team-logo" src="${logoSrc}" alt="${team}" />`
      : `<div class="team-logo-fallback" style="background:${TEAM_COLORS[team] || '#888'}"></div>`;
    return `
      <div class="standings-row">
        ${logoEl}
        <div class="team-name">${team}</div>
        ${changeHTML}
        <div class="team-pts" style="color:${TEAM_COLORS[team] || '#888'}">${pts}</div>
      </div>`;
  }).join('');

  const scorersHTML = scorers.length
    ? scorers.map(r => `
      <div class="scorer-row">
        <div>
          <div class="scorer-name">${r.player}</div>
          <div class="scorer-team">${r.team}</div>
        </div>
        <div class="scorer-pts" style="color:${TEAM_COLORS[r.team] || '#888'}">+${r.todayPts}</div>
      </div>`).join('')
    : '<div class="empty">No points scored today yet</div>';

  // Preload logo images for chart plugin
  const logoImages = {};
  await Promise.all(Object.entries(TEAM_LOGOS).map(([team, src]) => new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { logoImages[team] = img; resolve(); };
    img.onerror = resolve;
    img.src = src;
  })));

  // Full season date range
  const SEASON_START = '2026-03-26';
  const ALL_STAR_DATE = '2026-07-13';
  const SEASON_END   = '2026-09-27';
  const seasonDates  = getDates(SEASON_START, SEASON_END);

  // Chart datasets — null for dates with no data yet so line stops at today
  const teams = Object.keys(TEAM_COLORS);
  const datasets = teams.map(team => ({
    label: team,
    data: seasonDates.map(d => dailyData[d] ? (dailyData[d][team] ?? null) : null),
    borderColor: TEAM_COLORS[team],
    borderWidth: 3,
    pointRadius: 0,
    pointHoverRadius: 4,
    tension: 0.3,
    fill: false,
    spanGaps: false,
  }));

  // Plugin: draw circular team logos at the last non-null data point of each line
  const logoPlugin = {
    id: 'logoPlugin',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      chart.data.datasets.forEach((dataset, i) => {
        const meta = chart.getDatasetMeta(i);
        if (!meta.visible) return;
        const img = logoImages[dataset.label];
        if (!img) return;
        // Find last non-null point
        let lastPoint = null;
        for (let j = dataset.data.length - 1; j >= 0; j--) {
          if (dataset.data[j] !== null && dataset.data[j] !== undefined) {
            lastPoint = meta.data[j];
            break;
          }
        }
        if (!lastPoint) return;
        const x = lastPoint.x;
        const y = lastPoint.y;
        const r = 20;
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, r + 2, 0, Math.PI * 2);
        ctx.fillStyle = dataset.borderColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
        ctx.restore();
      });
    }
  };

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Standings</h2>
      ${standingsHTML}
    </div>

    <div class="card">
      <h2>Today's Dingers</h2>
      <div class="scorers-wrapper" id="scorers-wrapper">
        ${scorersHTML}
      </div>
      <button class="expand-btn" id="expand-btn"></button>
    </div>

    <div class="card full">
      <h2>HBP Players <span style="font-size:0.75rem;font-family:'Inter',sans-serif;font-weight:400;color:var(--muted);letter-spacing:0.03em;text-transform:none;">— 3 pts / HBP</span></h2>
      <div class="hbp-grid">
        ${sorted.map(([team]) => {
          const p = hbpPlayers[team];
          const color = TEAM_COLORS[team] || '#888';
          const logoSrc = TEAM_LOGOS[team];
          const logoEl = logoSrc
            ? `<img class="hbp-logo" src="${logoSrc}" alt="${team}" style="border-color:${color}" />`
            : `<div class="hbp-logo-fallback" style="background:${color}"></div>`;
          const pts = p ? p.points : 0;
          const hbps = Math.round(pts / 3);
          return `
            <div class="hbp-tile">
              ${logoEl}
              <div class="hbp-team">${team}</div>
              <div class="hbp-player">${p ? p.player : '—'}</div>
              <div class="hbp-pts" style="color:${color}">${pts} pts</div>
              <div class="hbp-count">${hbps} HBP</div>
            </div>`;
        }).join('')}
      </div>
    </div>

    <div class="card full">
      <h2>Season Race</h2>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </div>
  `;

  document.getElementById('updated').textContent = `Last updated: ${latestDate}`;
  initExpand(scorers.length);

  new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: seasonDates.map(d => d.slice(5)), datasets },
    plugins: [logoPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 30, right: 72, bottom: 0, left: 0 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          filter: item => item.parsed.y !== null,
          backgroundColor: '#161b25',
          borderColor: '#252d3d',
          borderWidth: 1,
          titleColor: '#6b7694',
          bodyColor: '#e8eaf0',
          padding: 12,
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`
          }
        },
        annotation: {
          annotations: {
            openingDay: {
              type: 'line', scaleID: 'x', value: '03-26',
              borderColor: 'rgba(255,255,255,0.2)', borderWidth: 1, borderDash: [4, 4],
              label: { display: true, content: 'Opening Day', position: 'start',
                color: '#6b7694', backgroundColor: 'transparent',
                font: { size: 10, family: 'Inter' }, padding: { x: 4, y: 2 } }
            },
            allStar: {
              type: 'line', scaleID: 'x', value: '07-13',
              borderColor: 'rgba(255,209,102,0.3)', borderWidth: 1, borderDash: [4, 4],
              label: { display: true, content: 'All-Star Break', position: 'start',
                color: '#6b7694', backgroundColor: 'transparent',
                font: { size: 10, family: 'Inter' }, padding: { x: 4, y: 2 } }
            },
            seasonEnd: {
              type: 'line', scaleID: 'x', value: '09-27',
              borderColor: 'rgba(255,255,255,0.2)', borderWidth: 1, borderDash: [4, 4],
              label: { display: true, content: 'Season End', position: 'start',
                color: '#6b7694', backgroundColor: 'transparent',
                font: { size: 10, family: 'Inter' }, padding: { x: 4, y: 2 } }
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1e2535' },
          ticks: { color: '#6b7694', font: { family: 'Inter', size: 11 }, maxTicksLimit: 10, maxRotation: 0 },
          title: { display: true, text: 'Date', color: '#6b7694', font: { family: 'Inter', size: 11 }, padding: { top: 8 } }
        },
        y: {
          grid: { color: '#1e2535' },
          ticks: { color: '#6b7694', font: { family: 'Inter', size: 11 }, stepSize: 1 },
          beginAtZero: true,
          grace: '20%',
          title: { display: true, text: 'Points', color: '#6b7694', font: { family: 'Inter', size: 11 }, padding: { bottom: 8 } }
        }
      }
    }
  });
}

function initExpand(total) {
  const wrapper = document.getElementById('scorers-wrapper');
  const btn = document.getElementById('expand-btn');
  if (!wrapper || !btn || total === 0) return;
  requestAnimationFrame(() => {
    if (wrapper.scrollHeight > wrapper.clientHeight + 4) {
      btn.style.display = 'block';
      btn.textContent = `Show all ${total} ↓`;
      btn.onclick = () => {
        const expanded = wrapper.classList.toggle('expanded');
        btn.textContent = expanded ? 'Show less ↑' : `Show all ${total} ↓`;
      };
    }
  });
}

main();
</script>
</body>
</html>
