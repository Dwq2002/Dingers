<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dingers 2026</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

    :root {
      --bg: #0d0f14;
      --card: #161b25;
      --border: #252d3d;
      --grid-line: #1e2535;
      --text: #e8eaf0;
      --muted: #6b7694;
      --green: #00c47d;
      --gold: #ffd166;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    header { text-align: center; margin-bottom: 36px; }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #fff 30%, #ffd166 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .card.full { grid-column: 1 / -1; }

    .card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .card h2 .sub {
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: none;
    }

    /* ---------- Standings ---------- */
    .standings-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid var(--border);
      border-radius: 10px;
    }
    .standings-row:last-child { border-bottom: none; }
    .standings-row.leader { background: rgba(255, 209, 102, 0.05); }

    .rank {
      width: 20px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
    }
    .standings-row.leader .rank { color: var(--gold); }

    .team-logo, .team-logo-fallback {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border);
    }

    .team-id { flex: 1; min-width: 0; }
    .team-name {
      font-weight: 700;
      font-size: 1.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .team-gap { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .team-pts {
      font-size: 1.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
      min-width: 56px;
      text-align: right;
    }

    .team-change {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      min-width: 46px;
      text-align: center;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .team-change.up   { background: rgba(0,196,125,0.15); color: var(--green); }
    .team-change.zero { background: rgba(107,118,148,0.15); color: var(--muted); }

    /* ---------- Today's scorers ---------- */
    .scorers-wrapper { flex: 1; min-height: 0; overflow: hidden; position: relative; }
    .scorers-wrapper.expanded { overflow: visible; }

    .scorer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .scorer-row:last-child { border-bottom: none; }

    .scorer-key {
      width: 14px; height: 3px; border-radius: 2px;
      display: inline-block; margin-right: 8px; vertical-align: middle;
      flex-shrink: 0;
    }
    .scorer-name { font-weight: 600; font-size: 0.95rem; }
    .scorer-team { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }

    .scorer-pts {
      font-size: 1.1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--green);
      flex-shrink: 0;
    }

    .expand-btn {
      display: none;
      margin-top: 12px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .expand-btn:hover { color: var(--text); }

    .empty { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 20px 0; }

    /* ---------- HBP panel ---------- */
    .hbp-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    @media (max-width: 720px) { .hbp-grid { grid-template-columns: repeat(2, 1fr); } }

    .hbp-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px 8px;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-align: center;
    }
    .hbp-logo, .hbp-logo-fallback {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
    }
    .hbp-team { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .hbp-player { font-weight: 600; font-size: 0.85rem; line-height: 1.3; }
    .hbp-pts { font-size: 1.3rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .hbp-count { font-size: 0.75rem; color: var(--muted); }

    /* ---------- Filter row ---------- */
    .filter-row {
      max-width: 1100px;
      margin: 24px auto 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .chip:hover { color: var(--text); }
    .chip.active {
      color: var(--text);
      border-color: var(--muted);
      background: #1c2333;
    }

    .filter-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }

    .date-input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      padding: 6px 10px;
      border-radius: 8px;
      color-scheme: dark;
    }
    .date-input:focus { outline: none; border-color: var(--muted); }

    .view-toggle { margin-left: auto; display: flex; gap: 0; }
    .view-toggle .chip { border-radius: 0; }
    .view-toggle .chip:first-child { border-radius: 20px 0 0 20px; }
    .view-toggle .chip:last-child { border-radius: 0 20px 20px 0; border-left: none; }

    /* ---------- Race card ---------- */
    .race-card { max-width: 1100px; margin: 0 auto; }

    .legend-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .legend-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 12px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .legend-chip .key { width: 16px; height: 3px; border-radius: 2px; }
    .legend-chip.off { opacity: 0.35; }
    .legend-chip:hover { border-color: var(--muted); }
    .legend-hint { font-size: 0.72rem; color: var(--muted); align-self: center; margin-left: 4px; }

    .chart-wrap { position: relative; height: 440px; }
    @media (max-width: 720px) { .chart-wrap { height: 340px; } }

    /* ---------- Race table view ---------- */
    .race-table-wrap { overflow: auto; max-height: 480px; }
    .race-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .race-table th, .race-table td {
      padding: 8px 12px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .race-table th:first-child, .race-table td:first-child { text-align: left; }
    .race-table thead th {
      position: sticky;
      top: 0;
      background: var(--card);
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 600;
      z-index: 1;
    }
    .race-table thead .key {
      display: inline-block;
      width: 14px; height: 3px; border-radius: 2px;
      margin-right: 6px; vertical-align: middle;
    }
    .race-table td.lead { font-weight: 700; }
    .race-table td.date-cell { color: var(--muted); }

    /* ---------- Rosters ---------- */
    .rosters-card { max-width: 1100px; margin: 20px auto 0; }

    details.roster {
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    details.roster:last-child { margin-bottom: 0; }

    details.roster summary {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    details.roster summary::-webkit-details-marker { display: none; }
    details.roster summary:hover { background: #1a2130; }

    .roster-logo, .roster-logo-fallback {
      width: 36px; height: 36px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      flex-shrink: 0;
    }
    .roster-team { font-weight: 700; font-size: 0.98rem; flex: 1; }
    .roster-total {
      font-size: 1rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .roster-swap-note { font-size: 0.72rem; color: var(--muted); }
    .roster-chevron {
      color: var(--muted);
      font-size: 0.8rem;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    details.roster[open] .roster-chevron { transform: rotate(180deg); }

    .roster-body { border-top: 1px solid var(--border); padding: 6px 16px 12px; }

    .roster-player {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--grid-line);
      font-size: 0.9rem;
    }
    .roster-player:last-child { border-bottom: none; }

    .roster-player .p-name { font-weight: 600; }
    .roster-player .p-out {
      text-decoration: line-through;
      color: var(--muted);
      font-weight: 400;
    }
    .roster-player .p-arrow { color: var(--muted); font-size: 0.8rem; }
    .roster-player .p-fill { flex: 1; }
    .roster-player .p-pts {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }
    .roster-player .p-pts-label { font-size: 0.7rem; color: var(--muted); min-width: 24px; }

    .badge {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 10px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge.hbp { background: rgba(255,209,102,0.12); color: var(--gold); }
    .badge.new { background: rgba(0,196,125,0.12); color: var(--green); }
    .badge.date { background: rgba(107,118,148,0.12); color: var(--muted); text-transform: none; letter-spacing: 0; }
    .badge.pos {
      background: rgba(107,118,148,0.16);
      color: var(--muted);
      min-width: 34px;
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* Frozen points the slot keeps, and what the new player has added since. */
    .roster-player .p-sub { font-size: 0.75rem; color: var(--muted); font-variant-numeric: tabular-nums; }
    .roster-player .p-gain {
      font-size: 0.75rem;
      color: var(--green);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ---------- Positional breakdown ---------- */
    .positions-card { max-width: 1100px; margin: 20px auto 0; }
    .pos-table-wrap { overflow-x: auto; }
    .pos-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .pos-table th, .pos-table td {
      padding: 9px 10px;
      text-align: right;
      border-bottom: 1px solid var(--grid-line);
      white-space: nowrap;
      vertical-align: top;
    }
    .pos-table thead th {
      color: var(--muted);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .pos-table th:first-child, .pos-table td:first-child {
      text-align: left;
      font-weight: 700;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }
    .pos-table tbody tr:hover { background: #1a2130; }
    .pos-table td.best { color: var(--gold); }
    .pos-table td.best .pos-pts { font-weight: 800; }
    .pos-table .pos-pts { font-weight: 700; }
    .pos-table tfoot td {
      border-top: 1px solid var(--border);
      border-bottom: none;
      font-weight: 800;
      padding-top: 11px;
    }
    .pos-player {
      display: block;
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: 0;
    }
    .pos-player .struck { text-decoration: line-through; }

    /* ---------- Misc ---------- */
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
    }

    .updated {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 32px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

<header>
  <h1>Dingers 2026</h1>
  <p>HR Fantasy League &bull; Season Standings</p>
</header>

<div class="grid" id="app">
  <div class="loading" style="grid-column:1/-1">Loading stats...</div>
</div>

<div id="race-section" style="display:none">
  <div class="filter-row" id="filter-row" role="group" aria-label="Season race date range">
    <button class="chip" data-range="season">Full Season</button>
    <button class="chip" data-range="break">Since Break</button>
    <button class="chip" data-range="30">Last 30</button>
    <button class="chip" data-range="14">Last 14</button>
    <button class="chip" data-range="7">Last 7</button>
    <div class="filter-sep"></div>
    <input type="date" class="date-input" id="date-from" aria-label="From date" />
    <input type="date" class="date-input" id="date-to" aria-label="To date" />
    <div class="view-toggle" role="group" aria-label="View">
      <button class="chip" data-view="chart">Chart</button>
      <button class="chip" data-view="table">Table</button>
    </div>
  </div>

  <div class="card race-card">
    <h2>Season Race</h2>
    <div class="legend-row" id="legend-row"></div>
    <div class="chart-wrap" id="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <div class="race-table-wrap" id="race-table-wrap" style="display:none"></div>
  </div>

  <div class="card rosters-card">
    <h2>Team Rosters <span class="sub">— click a team to expand &bull; swapped players struck through</span></h2>
    <div id="rosters"></div>
  </div>

  <div class="card positions-card">
    <h2>Positional Breakdown <span class="sub">— points by draft position &bull; best at each spot highlighted</span></h2>
    <div class="pos-table-wrap"><table class="pos-table" id="pos-table"></table></div>
  </div>
</div>

<p class="updated" id="updated"></p>

<script>
const RAW = 'https://raw.githubusercontent.com/Dwq2002/Dingers/main/data/daily/';
const RAW_DATA = 'https://raw.githubusercontent.com/Dwq2002/Dingers/main/data/';
const RAW_ASSETS = 'https://raw.githubusercontent.com/Dwq2002/Dingers/main/assets/team_icons/';

// Fixed team order — colors follow the team, never its rank.
// Palette validated for colorblind separation + 3:1 contrast on the card surface.
const TEAMS = [
  { name: 'Kid Named Dinger', color: '#3987e5', logo: RAW_ASSETS + 'Kid_Named_Dinger.JPEG' },
  { name: 'Bo',               color: '#e66767', logo: RAW_ASSETS + 'Bo.PNG' },
  { name: 'deep drivers',     color: '#c98500', logo: 'https://github.com/user-attachments/assets/03d3f450-bde2-4da9-a21e-785f599db9ef' },
  { name: "Swank's Tanks",    color: '#9085e9', logo: RAW_ASSETS + 'Swanks_Tanks.JPEG' },
  { name: "Swank's Shanks",   color: '#199e70', logo: RAW_ASSETS + 'Swanks_Shanks.JPG' },
];
const TEAM_COLORS = Object.fromEntries(TEAMS.map(t => [t.name, t.color]));
const TEAM_LOGOS  = Object.fromEntries(TEAMS.map(t => [t.name, t.logo]));

const SEASON_START  = '2026-03-23';
const ALL_STAR_DATE = '2026-07-13';

// Team renames — old CSV name -> current name, so history stays attached.
const TEAM_ALIASES = { 'Swank': 'deep drivers' };

const esc = s => String(s ?? '').replace(/[&<>"']/g,
  c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function parseCSV(text) {
  const [header, ...rows] = text.trim().split('\n');
  const keys = header.split(',');
  return rows.filter(r => r.trim()).map(row => {
    const vals = row.split(',');
    const obj = {};
    keys.forEach((k, i) => obj[k.trim()] = vals[i]?.trim());
    obj.points = Number(obj.points) || 0;
    if (TEAM_ALIASES[obj.team]) obj.team = TEAM_ALIASES[obj.team];
    return obj;
  });
}

function teamTotals(rows) {
  const totals = {};
  for (const r of rows) totals[r.team] = (totals[r.team] || 0) + r.points;
  return totals;
}

function getDates(start, end) {
  const dates = [];
  const cur = new Date(start + 'T12:00:00Z');
  const last = new Date(end + 'T12:00:00Z');
  while (cur <= last) {
    dates.push(cur.toISOString().slice(0, 10));
    cur.setUTCDate(cur.getUTCDate() + 1);
  }
  return dates;
}

const fmtDate = d => new Date(d + 'T12:00:00Z')
  .toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });

async function fetchCSV(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return parseCSV(await r.text());
  } catch { return null; }
}

// ---------- Global state ----------
const state = {
  dataDates: [],      // dates that actually have data, ascending
  dailyData: {},      // date -> rows
  dailyTotals: {},    // date -> {team: pts}
  swaps: [],          // rows from data/swaps_2026.csv
  positions: {},      // player -> draft position
  latestDate: null,
  rangeStart: null,
  rangeEnd: null,
  activePreset: 'season',
  view: 'chart',
  hidden: new Set(),
  chart: null,
  logoImages: {},
};

async function main() {
  const latest = await fetchCSV(RAW + 'latest.csv');
  if (!latest) {
    document.getElementById('app').innerHTML =
      '<div class="loading" style="grid-column:1/-1">Could not load data.</div>';
    return;
  }

  state.swaps = (await fetchCSV(RAW_DATA + 'swaps_2026.csv')) || [];

  // Draft positions. Position belongs to the roster slot, so a swapped-in
  // player inherits the position of the player he replaced.
  const posRows = (await fetchCSV(RAW_DATA + 'positions_2026.csv')) || [];
  state.positions = {};
  posRows.forEach(r => { state.positions[r.player] = r.position; });
  state.swaps.forEach(s => {
    if (state.positions[s.out_player]) state.positions[s.in_player] = state.positions[s.out_player];
  });

  const latestDate = latest[0]?.date || SEASON_START;
  const allDates = getDates(SEASON_START, latestDate);

  await Promise.all(allDates.map(async d => {
    const rows = await fetchCSV(RAW + `points_${d}.csv`);
    if (rows) {
      state.dailyData[d] = rows;
      state.dailyTotals[d] = teamTotals(rows);
    }
  }));

  state.dataDates = allDates.filter(d => state.dailyData[d]);
  state.latestDate = latestDate;
  state.rangeStart = state.dataDates[0];
  state.rangeEnd = latestDate;

  // Preload logos for the chart end-markers
  await Promise.all(TEAMS.map(t => new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { state.logoImages[t.name] = img; resolve(); };
    img.onerror = resolve;
    img.src = t.logo;
  })));

  renderTopCards(latest);
  renderLegend();
  initFilters();
  renderRace();
  renderRosters();
  renderPositions();

  document.getElementById('race-section').style.display = 'block';
  document.getElementById('updated').textContent = `Last updated: ${latestDate}`;
}

// ---------- Top cards: standings, today's dingers, HBP ----------
function renderTopCards(latest) {
  const current = teamTotals(latest);
  const sorted = Object.entries(current).sort((a, b) => b[1] - a[1]);
  const leaderPts = sorted[0]?.[1] || 0;

  const dates = state.dataDates;
  const prevDate = dates[dates.length - 2];
  const prev = prevDate ? (state.dailyTotals[prevDate] || {}) : {};
  const prevRows = prevDate ? state.dailyData[prevDate] : null;

  const logoEl = (team, cls) => {
    const src = TEAM_LOGOS[team];
    return src
      ? `<img class="${cls}" src="${esc(src)}" alt="" loading="lazy" />`
      : `<div class="${cls}-fallback" style="background:${TEAM_COLORS[team] || '#888'}"></div>`;
  };

  const standingsHTML = sorted.map(([team, pts], i) => {
    const change = pts - (prev[team] || 0);
    const changeHTML = change > 0
      ? `<span class="team-change up">+${change}</span>`
      : `<span class="team-change zero">&mdash;</span>`;
    const gap = leaderPts - pts;
    const gapText = i === 0 ? 'Leader' : `${gap} back`;
    return `
      <div class="standings-row${i === 0 ? ' leader' : ''}">
        <div class="rank">${i + 1}</div>
        ${logoEl(team, 'team-logo')}
        <div class="team-id">
          <div class="team-name">${esc(team)}</div>
          <div class="team-gap">${gapText}</div>
        </div>
        ${changeHTML}
        <div class="team-pts">${pts}</div>
      </div>`;
  }).join('');

  // Today's scorers — diff vs previous day
  const prevPlayerPts = {};
  if (prevRows) for (const r of prevRows) prevPlayerPts[r.player] = r.points;
  const scorers = latest
    .map(r => ({ ...r, todayPts: r.points - (prevPlayerPts[r.player] ?? 0) }))
    .filter(r => r.todayPts > 0)
    .sort((a, b) => b.todayPts - a.todayPts);

  const scorersHTML = scorers.length
    ? scorers.map(r => `
      <div class="scorer-row">
        <div>
          <div class="scorer-name"><span class="scorer-key" style="background:${TEAM_COLORS[r.team] || '#888'}"></span>${esc(r.player)}</div>
          <div class="scorer-team">${esc(r.team)}</div>
        </div>
        <div class="scorer-pts">+${r.todayPts}</div>
      </div>`).join('')
    : '<div class="empty">No points scored today yet</div>';

  // HBP players — last player listed per team
  const hbpPlayers = {};
  for (const r of latest) hbpPlayers[r.team] = r;

  const hbpHTML = sorted.map(([team]) => {
    const p = hbpPlayers[team];
    const pts = p ? p.points : 0;
    const hbps = Math.round(pts / 3);
    return `
      <div class="hbp-tile">
        ${logoEl(team, 'hbp-logo')}
        <div class="hbp-team">${esc(team)}</div>
        <div class="hbp-player">${p ? esc(p.player) : '&mdash;'}</div>
        <div class="hbp-pts">${pts} pts</div>
        <div class="hbp-count">${hbps} HBP</div>
      </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="card">
      <h2>Standings</h2>
      ${standingsHTML}
    </div>

    <div class="card">
      <h2>Today's Dingers</h2>
      <div class="scorers-wrapper" id="scorers-wrapper">${scorersHTML}</div>
      <button class="expand-btn" id="expand-btn"></button>
    </div>

    <div class="card full">
      <h2>HBP Players <span class="sub">&mdash; 3 pts / HBP</span></h2>
      <div class="hbp-grid">${hbpHTML}</div>
    </div>
  `;

  initExpand(scorers.length);
  state.sortedTeams = sorted.map(([team]) => team);
}

// ---------- Filters ----------
function initFilters() {
  const row = document.getElementById('filter-row');
  const from = document.getElementById('date-from');
  const to = document.getElementById('date-to');

  from.min = state.dataDates[0]; from.max = state.latestDate;
  to.min = state.dataDates[0];   to.max = state.latestDate;
  from.value = state.rangeStart; to.value = state.rangeEnd;

  row.querySelectorAll('[data-range]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.activePreset = btn.dataset.range;
      applyPreset(btn.dataset.range);
      from.value = state.rangeStart;
      to.value = state.rangeEnd;
      syncChips();
      renderRace();
    });
  });

  const onCustom = () => {
    if (!from.value || !to.value || from.value > to.value) return;
    state.rangeStart = from.value;
    state.rangeEnd = to.value;
    state.activePreset = null;
    syncChips();
    renderRace();
  };
  from.addEventListener('change', onCustom);
  to.addEventListener('change', onCustom);

  row.querySelectorAll('[data-view]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      syncChips();
      renderRace();
    });
  });

  syncChips();
}

function applyPreset(preset) {
  const end = state.latestDate;
  if (preset === 'season') {
    state.rangeStart = state.dataDates[0];
  } else if (preset === 'break') {
    state.rangeStart = ALL_STAR_DATE <= end ? ALL_STAR_DATE : state.dataDates[0];
  } else {
    const days = Number(preset);
    const d = new Date(end + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() - (days - 1));
    const start = d.toISOString().slice(0, 10);
    state.rangeStart = start < state.dataDates[0] ? state.dataDates[0] : start;
  }
  state.rangeEnd = end;
}

function syncChips() {
  const row = document.getElementById('filter-row');
  row.querySelectorAll('[data-range]').forEach(b =>
    b.classList.toggle('active', b.dataset.range === state.activePreset));
  row.querySelectorAll('[data-view]').forEach(b =>
    b.classList.toggle('active', b.dataset.view === state.view));
}

// ---------- Legend ----------
function renderLegend() {
  const rowEl = document.getElementById('legend-row');
  rowEl.innerHTML = '';
  TEAMS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'legend-chip' + (state.hidden.has(t.name) ? ' off' : '');
    btn.setAttribute('aria-pressed', String(!state.hidden.has(t.name)));
    const key = document.createElement('span');
    key.className = 'key';
    key.style.background = t.color;
    btn.appendChild(key);
    btn.appendChild(document.createTextNode(t.name));
    btn.addEventListener('click', () => {
      if (state.hidden.has(t.name)) state.hidden.delete(t.name);
      else state.hidden.add(t.name);
      renderLegend();
      renderRace();
    });
    rowEl.appendChild(btn);
  });
  const hint = document.createElement('span');
  hint.className = 'legend-hint';
  hint.textContent = 'click to show / hide';
  rowEl.appendChild(hint);
}

// ---------- Season race (chart + table) ----------
function filteredDates() {
  return state.dataDates.filter(d => d >= state.rangeStart && d <= state.rangeEnd);
}

function renderRace() {
  const chartWrap = document.getElementById('chart-wrap');
  const tableWrap = document.getElementById('race-table-wrap');
  if (state.view === 'table') {
    chartWrap.style.display = 'none';
    tableWrap.style.display = 'block';
    renderRaceTable();
  } else {
    tableWrap.style.display = 'none';
    chartWrap.style.display = 'block';
    renderRaceChart();
  }
}

function renderRaceChart() {
  const dates = filteredDates();
  const isFullSeason = state.rangeStart === state.dataDates[0];

  const datasets = TEAMS.map(t => ({
    label: t.name,
    data: dates.map(d => state.dailyTotals[d]?.[t.name] ?? null),
    borderColor: t.color,
    backgroundColor: t.color,
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 5,
    pointHoverBackgroundColor: t.color,
    pointHoverBorderColor: '#161b25',
    pointHoverBorderWidth: 2,
    tension: 0.25,
    fill: false,
    spanGaps: true,
    hidden: state.hidden.has(t.name),
  }));

  // Circular team logo at the last point of each visible line — the direct label.
  const logoPlugin = {
    id: 'logoPlugin',
    afterDatasetsDraw(chart) {
      const { ctx } = chart;
      chart.data.datasets.forEach((dataset, i) => {
        const meta = chart.getDatasetMeta(i);
        if (!meta.visible) return;
        const img = state.logoImages[dataset.label];
        if (!img) return;
        let lastPoint = null;
        for (let j = dataset.data.length - 1; j >= 0; j--) {
          if (dataset.data[j] != null) { lastPoint = meta.data[j]; break; }
        }
        if (!lastPoint) return;
        const { x, y } = lastPoint;
        const r = 15;
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, r + 2, 0, Math.PI * 2);
        ctx.fillStyle = dataset.borderColor;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(img, x - r, y - r, r * 2, r * 2);
        ctx.restore();
      });
    }
  };

  // Vertical crosshair that tracks the hovered date.
  const crosshairPlugin = {
    id: 'crosshair',
    afterDraw(chart) {
      const active = chart.tooltip?.getActiveElements();
      if (!active?.length) return;
      const x = active[0].element.x;
      const { top, bottom } = chart.chartArea;
      const ctx = chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x, top);
      ctx.lineTo(x, bottom);
      ctx.lineWidth = 1;
      ctx.strokeStyle = 'rgba(232,234,240,0.25)';
      ctx.stroke();
      ctx.restore();
    }
  };

  const annotations = {};
  if (ALL_STAR_DATE >= dates[0] && ALL_STAR_DATE <= dates[dates.length - 1]) {
    annotations.allStar = {
      type: 'line', scaleID: 'x', value: fmtDate(ALL_STAR_DATE),
      borderColor: 'rgba(255,209,102,0.35)', borderWidth: 1,
      label: { display: true, content: 'All-Star Break', position: 'start',
        color: '#6b7694', backgroundColor: 'transparent',
        font: { size: 10, family: 'Inter' }, padding: { x: 4, y: 2 } }
    };
  }

  if (state.chart) state.chart.destroy();
  state.chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: dates.map(fmtDate), datasets },
    plugins: [logoPlugin, crosshairPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      layout: { padding: { top: 24, right: 44, bottom: 0, left: 0 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'index',
          intersect: false,
          filter: item => item.parsed.y !== null,
          itemSort: (a, b) => b.parsed.y - a.parsed.y,
          backgroundColor: '#161b25',
          borderColor: '#252d3d',
          borderWidth: 1,
          titleColor: '#6b7694',
          bodyColor: '#e8eaf0',
          padding: 12,
          usePointStyle: true,
          boxWidth: 12,
          boxHeight: 3,
          callbacks: {
            labelPointStyle: () => ({ pointStyle: 'line', rotation: 0 }),
            label: ctx => ` ${ctx.parsed.y} — ${ctx.dataset.label}`,
          }
        },
        annotation: { annotations }
      },
      scales: {
        x: {
          grid: { color: '#1e2535' },
          ticks: {
            color: '#6b7694',
            font: { family: 'Inter', size: 11 },
            maxTicksLimit: dates.length <= 16 ? dates.length : 12,
            maxRotation: 0,
          },
        },
        y: {
          grid: { color: '#1e2535' },
          ticks: { color: '#6b7694', font: { family: 'Inter', size: 11 }, precision: 0 },
          beginAtZero: isFullSeason,
          grace: '8%',
          title: { display: true, text: 'Points', color: '#6b7694',
            font: { family: 'Inter', size: 11 }, padding: { bottom: 8 } }
        }
      }
    }
  });
}

function renderRaceTable() {
  const wrap = document.getElementById('race-table-wrap');
  const dates = filteredDates().slice().reverse(); // latest first
  const teams = TEAMS.filter(t => !state.hidden.has(t.name));

  const table = document.createElement('table');
  table.className = 'race-table';

  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.textContent = 'Date';
  hr.appendChild(th0);
  teams.forEach(t => {
    const th = document.createElement('th');
    const key = document.createElement('span');
    key.className = 'key';
    key.style.background = t.color;
    th.appendChild(key);
    th.appendChild(document.createTextNode(t.name));
    hr.appendChild(th);
  });
  thead.appendChild(hr);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  dates.forEach(d => {
    const totals = state.dailyTotals[d] || {};
    const vals = teams.map(t => totals[t.name] ?? null);
    const max = Math.max(...vals.filter(v => v !== null));
    const tr = document.createElement('tr');
    const td0 = document.createElement('td');
    td0.className = 'date-cell';
    td0.textContent = fmtDate(d);
    tr.appendChild(td0);
    vals.forEach(v => {
      const td = document.createElement('td');
      td.textContent = v === null ? '—' : v;
      if (v !== null && v === max) td.className = 'lead';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);

  wrap.innerHTML = '';
  wrap.appendChild(table);
}

// ---------- Rosters & swap detection ----------
// One entry per roster slot, in roster order. A swapped slot carries both the
// frozen player and his replacement, and is worth the sum of the two: the slot
// keeps what the old player earned and grows as the new one homers.
function computeRosterInfo() {
  const rosterOn = (date, team) =>
    (state.dailyData[date] || []).filter(r => r.team === team);

  return TEAMS.map(t => {
    // Swaps come from the ledger rather than being inferred from the data: a
    // swapped-out player keeps a frozen row in the CSV, so he never disappears.
    const swaps = state.swaps.filter(s => s.team === t.name);
    const swapIn = {}, swapOut = {};
    swaps.forEach(s => { swapIn[s.in_player] = s; swapOut[s.out_player] = s; });

    const allRows = rosterOn(state.latestDate, t.name);
    const rowFor = {};
    allRows.forEach(r => { rowFor[r.player] = r; });
    const total = allRows.reduce((s, r) => s + r.points, 0);

    const slot = (player, pts, s, outPts) => ({
      player, pts, pos: state.positions[player] || '',
      out: s ? s.out_player : null,
      outPts: outPts || 0,
      swapDate: s ? s.swap_date : null,
      total: pts + (outPts || 0),
    });

    const slots = [];
    allRows.forEach(r => {
      const asOut = swapOut[r.player];
      if (asOut) {
        // Frozen player. His slot renders wherever his replacement's row is; if
        // the daily CSV hasn't picked the swap up yet, render the slot here so
        // the roster still adds up to the team total.
        if (!rowFor[asOut.in_player]) slots.push(slot(asOut.in_player, 0, asOut, r.points));
        return;
      }
      const asIn = swapIn[r.player];
      const outPts = asIn
        ? (rowFor[asIn.out_player]?.points ?? (Number(asIn.out_points_frozen) || 0))
        : 0;
      slots.push(slot(r.player, r.points, asIn, outPts));
    });

    return { team: t, slots, swaps, total };
  });
}

function renderRosters() {
  const container = document.getElementById('rosters');
  container.innerHTML = '';
  const infos = computeRosterInfo();

  // Order roster cards by current standings.
  const order = state.sortedTeams || TEAMS.map(t => t.name);
  infos.sort((a, b) => order.indexOf(a.team.name) - order.indexOf(b.team.name));

  infos.forEach(({ team, slots, swaps, total }, idx) => {
    const details = document.createElement('details');
    details.className = 'roster';
    if (idx === 0) details.open = true;

    const summary = document.createElement('summary');
    const logoSrc = TEAM_LOGOS[team.name];
    summary.innerHTML = `
      ${logoSrc
        ? `<img class="roster-logo" src="${esc(logoSrc)}" alt="" loading="lazy" />`
        : `<div class="roster-logo-fallback" style="background:${team.color}"></div>`}
      <span class="roster-team">${esc(team.name)}</span>
      ${swaps.length ? `<span class="roster-swap-note">${swaps.length} swap${swaps.length > 1 ? 's' : ''}</span>` : ''}
      <span class="roster-total">${total} pts</span>
      <span class="roster-chevron">▼</span>`;
    details.appendChild(summary);

    const body = document.createElement('div');
    body.className = 'roster-body';

    slots.forEach((s, i) => {
      const isHBP = i === slots.length - 1;
      const row = document.createElement('div');
      row.className = 'roster-player';
      const pos = s.pos ? `<span class="badge pos">${esc(s.pos)}</span>` : '';
      const hbp = isHBP ? '<span class="badge hbp">HBP</span>' : '';

      if (s.out) {
        // Slot total = what the frozen player banked + what the new one has added.
        row.innerHTML = `
          ${pos}
          <span class="p-out">${esc(s.out)}</span>
          <span class="p-sub">${s.outPts}</span>
          <span class="badge date">${fmtDate(s.swapDate)}</span>
          <span class="p-arrow">→</span>
          <span class="p-name">${esc(s.player)}</span>
          <span class="p-gain">+${s.pts}</span>
          ${hbp}
          <span class="p-fill"></span>
          <span class="p-pts">${s.total}</span>
          <span class="p-pts-label">pts</span>`;
      } else {
        row.innerHTML = `
          ${pos}
          <span class="p-name">${esc(s.player)}</span>
          ${hbp}
          <span class="p-fill"></span>
          <span class="p-pts">${s.total}</span>
          <span class="p-pts-label">pts</span>`;
      }
      body.appendChild(row);
    });

    details.appendChild(body);
    container.appendChild(details);
  });
}

// ---------- Positional breakdown ----------
const POS_ORDER = ['C', '1B', '2B', '3B', 'SS', 'LF', 'CF', 'RF', 'DH', 'UTIL', 'HBP'];

function renderPositions() {
  const infos = computeRosterInfo();
  const order = state.sortedTeams || TEAMS.map(t => t.name);
  infos.sort((a, b) => order.indexOf(a.team.name) - order.indexOf(b.team.name));

  const at = {};   // position -> team name -> slot
  infos.forEach(({ team, slots }) => {
    slots.forEach(s => { if (s.pos) (at[s.pos] = at[s.pos] || {})[team.name] = s; });
  });

  const head = `<thead><tr><th>Pos</th>${infos
    .map(i => `<th>${esc(i.team.name)}</th>`).join('')}</tr></thead>`;

  const body = POS_ORDER.filter(p => at[p]).map(pos => {
    const cells = infos.map(i => at[pos][i.team.name]);
    const best = Math.max(...cells.map(c => (c ? c.total : -1)));
    const tds = cells.map(c => {
      if (!c) return '<td>—</td>';
      const name = c.out
        ? `<span class="struck">${esc(c.out)}</span> → ${esc(c.player)}`
        : esc(c.player);
      return `<td class="${c.total === best && best > 0 ? 'best' : ''}">`
           + `<span class="pos-pts">${c.total}</span>`
           + `<span class="pos-player">${name}</span></td>`;
    }).join('');
    return `<tr><td>${pos}</td>${tds}</tr>`;
  }).join('');

  const foot = `<tfoot><tr><td>Total</td>${infos
    .map(i => `<td><span class="pos-pts">${i.total}</span></td>`).join('')}</tr></tfoot>`;

  document.getElementById('pos-table').innerHTML = head + `<tbody>${body}</tbody>` + foot;
}

// ---------- Expand button for Today's Dingers ----------
function initExpand(total) {
  const wrapper = document.getElementById('scorers-wrapper');
  const btn = document.getElementById('expand-btn');
  if (!wrapper || !btn || total === 0) return;
  requestAnimationFrame(() => {
    if (wrapper.scrollHeight > wrapper.clientHeight + 4) {
      btn.style.display = 'block';
      btn.textContent = `Show all ${total} ↓`;
      btn.onclick = () => {
        const expanded = wrapper.classList.toggle('expanded');
        btn.textContent = expanded ? 'Show less ↑' : `Show all ${total} ↓`;
      };
    }
  });
}

main();
